<!DOCTYPE html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>جاري تشغيل النظام</title>
    <style>
      body {
        margin: 0;
        font-family: "Segoe UI", Tahoma, Arial, sans-serif;
        background: linear-gradient(135deg, #0f4c5c, #15395b);
        color: #ffffff;
        min-height: 100vh;
        display: grid;
        place-items: center;
      }

      .card {
        width: min(88vw, 520px);
        padding: 32px;
        border-radius: 24px;
        background: rgba(255, 255, 255, 0.08);
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.18);
        text-align: center;
        backdrop-filter: blur(12px);
      }

      .loader {
        width: 72px;
        height: 72px;
        margin: 0 auto 18px;
        border-radius: 50%;
        border: 5px solid rgba(255, 255, 255, 0.2);
        border-top-color: #f3d58f;
        animation: spin 1s linear infinite;
      }

      h1 {
        margin: 0 0 10px;
        font-size: 1.6rem;
      }

      p {
        margin: 0;
        color: rgba(255, 255, 255, 0.82);
        line-height: 1.8;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body>
    <section class="card">
      <div class="loader"></div>
      <h1>نظام إدارة العلامات والنماذج الصناعية</h1>
      <p>جاري تشغيل خادم Django المحلي وتهيئة الواجهة داخل Electron. يرجى الانتظار قليلًا...</p>
    </section>
  </body>
</html>
